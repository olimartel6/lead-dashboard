<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Lead Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root {
  --bg: #0B0D13; --card: #13151D; --elevated: #1A1D28; --border: #2A2D3A;
  --text: #E8E9ED; --text-light: #9CA3AF; --text-muted: #6B7280;
  --primary: #8B5CF6; --primary-light: #A78BFA; --primary-glow: rgba(139,92,246,0.15);
  --success: #10B981; --success-light: rgba(16,185,129,0.12);
  --warning: #F59E0B; --warning-light: rgba(245,158,11,0.12);
  --danger: #EF4444; --danger-light: rgba(239,68,68,0.12);
  --radius: 14px; --font: 'Inter', system-ui, sans-serif;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: var(--font); background: var(--bg); color: var(--text); min-height: 100vh; -webkit-font-smoothing: antialiased; }
.hidden { display: none !important; }

/* Login */
.login-page { min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px; }
.login-card { background: var(--card); border: 1px solid var(--border); border-radius: var(--radius); padding: 40px 28px; width: 100%; max-width: 400px; text-align: center; }
.login-card h1 { font-size: 24px; font-weight: 800; margin-bottom: 4px; }
.login-card h1 span { color: var(--primary-light); }
.login-card p { color: var(--text-muted); font-size: 13px; margin-bottom: 28px; }
.input { width: 100%; padding: 14px 16px; background: var(--bg); border: 1px solid var(--border); border-radius: 10px; color: var(--text); font-family: var(--font); font-size: 15px; margin-bottom: 12px; }
.input:focus { outline: none; border-color: var(--primary); box-shadow: 0 0 0 3px var(--primary-glow); }
.input::placeholder { color: var(--text-muted); }
.btn { width: 100%; padding: 14px; border: none; border-radius: 10px; font-family: var(--font); font-size: 15px; font-weight: 600; cursor: pointer; transition: all 0.2s; }
.btn-primary { background: var(--primary); color: white; }
.btn-primary:hover { background: #7C3AED; }
.btn-secondary { background: var(--elevated); color: var(--text-light); border: 1px solid var(--border); margin-top: 8px; }
.btn-small { width: auto; padding: 8px 16px; font-size: 12px; }
.error-msg { background: var(--danger-light); color: var(--danger); padding: 10px; border-radius: 8px; font-size: 13px; margin-bottom: 12px; }

/* App shell */
.app { max-width: 480px; margin: 0 auto; min-height: 100vh; position: relative; }
.page { padding: 20px 16px; padding-bottom: 90px; }

/* Top bar */
.topbar { display: flex; justify-content: space-between; align-items: center; padding: 16px 0; }
.topbar h1 { font-size: 20px; font-weight: 800; }
.topbar h1 span { color: var(--primary-light); }
.topbar-right { display: flex; align-items: center; gap: 8px; }
.user-pill { background: var(--elevated); border: 1px solid var(--border); border-radius: 20px; padding: 6px 12px; font-size: 11px; color: var(--text-light); font-weight: 600; }
.admin-pill { background: var(--primary-glow); color: var(--primary-light); border-color: rgba(139,92,246,0.3); }
.logout-btn { background: none; border: none; color: var(--text-muted); font-size: 12px; cursor: pointer; font-family: var(--font); }

/* Stats row */
.stats { display: flex; gap: 8px; margin-bottom: 16px; }
.stat { background: var(--card); border: 1px solid var(--border); border-radius: 10px; padding: 12px; text-align: center; flex: 1; }
.stat-num { font-size: 20px; font-weight: 800; }
.stat-label { font-size: 9px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.5px; font-weight: 600; }

/* Sub-filters (pills) */
.sub-filters { display: flex; gap: 6px; margin-bottom: 16px; overflow-x: auto; -webkit-overflow-scrolling: touch; }
.sub-filter { white-space: nowrap; padding: 7px 14px; border-radius: 20px; font-size: 12px; font-weight: 600; cursor: pointer; transition: all 0.2s; background: var(--elevated); color: var(--text-muted); border: 1px solid var(--border); }
.sub-filter.active { background: var(--primary); color: white; border-color: var(--primary); }
.sub-filter .count { display: inline-block; min-width: 16px; height: 16px; line-height: 16px; text-align: center; border-radius: 8px; font-size: 10px; margin-left: 4px; background: rgba(255,255,255,0.15); }

/* Search */
.search { width: 100%; padding: 12px 14px; background: var(--card); border: 1px solid var(--border); border-radius: 10px; color: var(--text); font-family: var(--font); font-size: 14px; margin-bottom: 12px; }
.search:focus { outline: none; border-color: var(--primary); }
.search::placeholder { color: var(--text-muted); }

/* Lead card */
.lead-card { background: var(--card); border: 1px solid var(--border); border-radius: var(--radius); padding: 16px; margin-bottom: 10px; transition: all 0.15s; }
.lead-card:active { transform: scale(0.98); }
.lead-top { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 8px; }
.lead-name { font-size: 15px; font-weight: 700; }
.lead-meta { font-size: 11px; color: var(--text-muted); margin-top: 2px; }
.lead-score { font-size: 11px; font-weight: 700; padding: 3px 8px; border-radius: 6px; }
.score-low { background: var(--danger-light); color: var(--danger); }
.score-med { background: var(--warning-light); color: var(--warning); }

.lead-contact { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 10px; font-size: 12px; color: var(--text-light); }
.lead-contact a { color: var(--primary-light); text-decoration: none; }

.lead-btns { display: flex; gap: 6px; margin-bottom: 10px; }
.lead-btn { padding: 6px 10px; border-radius: 8px; font-size: 11px; font-weight: 600; text-decoration: none; border: none; cursor: pointer; font-family: var(--font); }
.btn-demo { background: var(--primary-glow); color: var(--primary-light); }
.btn-claim { background: var(--primary); color: white; }
.btn-ghost { background: var(--elevated); color: var(--text-light); border: 1px solid var(--border); }

/* Expandable sections */
.expand-btn { background: none; border: none; color: var(--primary-light); font-family: var(--font); font-size: 12px; font-weight: 600; cursor: pointer; padding: 4px 0; margin-right: 12px; }
.expand-content { background: var(--elevated); border-radius: 10px; padding: 14px; margin-top: 8px; margin-bottom: 8px; }
.expand-label { font-size: 10px; font-weight: 700; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 6px; }
.expand-subject { font-size: 13px; font-weight: 600; color: var(--primary-light); margin-bottom: 6px; }
.expand-body { font-size: 12px; color: var(--text-light); line-height: 1.6; white-space: pre-wrap; }
.copy-btn { margin-top: 8px; padding: 6px 14px; border-radius: 8px; background: var(--card); border: 1px solid var(--border); color: var(--text-light); font-family: var(--font); font-size: 11px; font-weight: 600; cursor: pointer; }

/* Status actions in my leads */
.status-actions { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 10px; }
.status-btn { padding: 7px 12px; border-radius: 8px; font-size: 11px; font-weight: 600; cursor: pointer; font-family: var(--font); transition: all 0.15s; background: var(--elevated); color: var(--text-muted); border: 1px solid var(--border); }
.status-btn:active { transform: scale(0.95); }
.status-btn.s-emailed { background: var(--warning-light); color: var(--warning); border-color: rgba(245,158,11,0.3); }
.status-btn.s-replied { background: var(--primary-glow); color: var(--primary-light); border-color: rgba(139,92,246,0.3); }
.status-btn.s-sold { background: var(--success-light); color: var(--success); border-color: rgba(16,185,129,0.3); }
.status-btn.s-rejected { background: var(--danger-light); color: var(--danger); border-color: rgba(239,68,68,0.3); }

/* Bottom nav */
.bottom-nav { position: fixed; bottom: 0; left: 50%; transform: translateX(-50%); width: 100%; max-width: 480px; background: rgba(11,13,19,0.95); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); display: flex; border-top: 1px solid var(--border); padding: 8px 0; padding-bottom: max(8px, env(safe-area-inset-bottom)); z-index: 100; }
.nav-item { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 3px; padding: 6px; color: var(--text-muted); font-size: 10px; font-weight: 600; cursor: pointer; transition: all 0.2s; background: none; border: none; font-family: var(--font); letter-spacing: 0.3px; text-transform: uppercase; }
.nav-item.active { color: var(--primary-light); }
.nav-icon { font-size: 20px; }
.nav-badge { background: var(--primary); color: white; font-size: 10px; min-width: 18px; height: 18px; line-height: 18px; text-align: center; border-radius: 9px; position: absolute; top: 2px; right: calc(50% - 20px); }
.nav-item { position: relative; }

/* Seller list (admin) */
.seller-row { background: var(--card); border: 1px solid var(--border); border-radius: 10px; padding: 14px; margin-bottom: 8px; display: flex; justify-content: space-between; align-items: center; }
.seller-name { font-weight: 600; font-size: 14px; }
.seller-email { font-size: 11px; color: var(--text-muted); }

.empty { text-align: center; padding: 50px 20px; color: var(--text-muted); font-size: 14px; }
</style>
</head>
<body>

<!-- LOGIN -->
<div id="login-page" class="login-page">
  <div class="login-card">
    <h1>Lead <span>Dashboard</span></h1>
    <p>Connectez-vous pour accéder aux leads</p>
    <div id="login-error" class="error-msg hidden"></div>
    <div id="mode-signin">
      <input type="email" class="input" id="login-email" placeholder="Email">
      <input type="password" class="input" id="login-password" placeholder="Mot de passe">
      <button class="btn btn-primary" onclick="doSignIn()">Connexion</button>
      <button class="btn btn-secondary" onclick="showMode('signup')">Créer un compte vendeur</button>
    </div>
    <div id="mode-signup" class="hidden">
      <input type="text" class="input" id="signup-name" placeholder="Votre nom">
      <input type="email" class="input" id="signup-email" placeholder="Email">
      <input type="password" class="input" id="signup-password" placeholder="Mot de passe (min 6)">
      <button class="btn btn-primary" onclick="doSignUp()">Créer le compte</button>
      <button class="btn btn-secondary" onclick="showMode('signin')">Retour</button>
    </div>
  </div>
</div>

<!-- DASHBOARD -->
<div id="app" class="app hidden">
  <div class="page" id="page-content"></div>
  <nav class="bottom-nav">
    <button class="nav-item active" id="nav-available" onclick="navigate('available')">
      <span class="nav-icon">📋</span> Disponibles
      <span class="nav-badge hidden" id="badge-available"></span>
    </button>
    <button class="nav-item" id="nav-mine" onclick="navigate('mine')">
      <span class="nav-icon">📁</span> Mes leads
      <span class="nav-badge hidden" id="badge-mine"></span>
    </button>
    <button class="nav-item hidden" id="nav-admin" onclick="navigate('admin')">
      <span class="nav-icon">👑</span> Admin
    </button>
  </nav>
</div>

<script>
var SB = window.supabase.createClient(
  'https://ybmzhztsyyrpxgsempzz.supabase.co',
  'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InlibXpoenRzeXlycHhnc2VtcHp6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM2OTU0MTgsImV4cCI6MjA4OTI3MTQxOH0.MBjRFHrF1viOaV1pJqNnQjxEk7mpzJo-DksHtbCk-ug'
);

var user = null, seller = null, leads = [], sellers = [];
var currentPage = 'available', mineFilter = 'all';

// Auth
function showMode(m) {
  document.getElementById('mode-signin').classList.toggle('hidden', m !== 'signin');
  document.getElementById('mode-signup').classList.toggle('hidden', m !== 'signup');
}

async function doSignIn() {
  var e = document.getElementById('login-email').value;
  var p = document.getElementById('login-password').value;
  document.getElementById('login-error').classList.add('hidden');
  var r = await SB.auth.signInWithPassword({ email: e, password: p });
  if (r.error) { document.getElementById('login-error').textContent = r.error.message; document.getElementById('login-error').classList.remove('hidden'); }
}

async function doSignUp() {
  var n = document.getElementById('signup-name').value;
  var e = document.getElementById('signup-email').value;
  var p = document.getElementById('signup-password').value;
  document.getElementById('login-error').classList.add('hidden');
  var r = await SB.auth.signUp({ email: e, password: p });
  if (r.error) {
    var r2 = await SB.auth.signInWithPassword({ email: e, password: p });
    if (r2.error) { document.getElementById('login-error').textContent = r.error.message; document.getElementById('login-error').classList.remove('hidden'); }
    return;
  }
  if (r.data.user) {
    await SB.from('lead_sellers').upsert({ id: r.data.user.id, email: e, name: n, role: 'seller' });
    if (!r.data.session) await SB.auth.signInWithPassword({ email: e, password: p });
  }
}

SB.auth.onAuthStateChange(async function(ev, session) {
  if (session && session.user) {
    user = session.user;
    document.getElementById('login-page').classList.add('hidden');
    document.getElementById('app').classList.remove('hidden');
    await loadSeller();
    await loadData();
    render();
  } else {
    document.getElementById('login-page').classList.remove('hidden');
    document.getElementById('app').classList.add('hidden');
  }
});

async function loadSeller() {
  var r = await SB.from('lead_sellers').select('*').eq('id', user.id).single();
  if (r.data) { seller = r.data; }
  else {
    await SB.from('lead_sellers').upsert({ id: user.id, email: user.email, name: user.email.split('@')[0], role: 'seller' });
    var r2 = await SB.from('lead_sellers').select('*').eq('id', user.id).single();
    seller = r2.data;
  }
  if (seller && seller.role === 'admin') document.getElementById('nav-admin').classList.remove('hidden');
}

async function loadData() {
  var r = await SB.from('lead_businesses').select('*').order('created_at', { ascending: false });
  leads = r.data || [];
  if (seller && seller.role === 'admin') {
    var s = await SB.from('lead_sellers').select('*');
    sellers = s.data || [];
  }
}

function navigate(page) {
  currentPage = page;
  mineFilter = 'all';
  document.querySelectorAll('.nav-item').forEach(function(n) { n.classList.remove('active'); });
  document.getElementById('nav-' + page).classList.add('active');
  render();
}

function setMineFilter(f) { mineFilter = f; render(); }

function render() {
  var avail = leads.filter(function(l) { return l.status === 'available'; }).length;
  var mine = leads.filter(function(l) { return l.assigned_to === user.id; }).length;

  var ba = document.getElementById('badge-available');
  ba.textContent = avail; ba.classList.toggle('hidden', avail === 0);
  var bm = document.getElementById('badge-mine');
  bm.textContent = mine; bm.classList.toggle('hidden', mine === 0);

  if (currentPage === 'available') renderAvailable();
  else if (currentPage === 'mine') renderMine();
  else if (currentPage === 'admin') renderAdmin();
}

function renderAvailable() {
  var avail = leads.filter(function(l) { return l.status === 'available'; });
  var h = '<div class="topbar"><h1>Lead <span>Dashboard</span></h1><div class="topbar-right"><span class="user-pill' + (seller && seller.role === 'admin' ? ' admin-pill' : '') + '">' + (seller ? seller.name : '') + '</span><button class="logout-btn" onclick="SB.auth.signOut().then(function(){location.reload()})">Déco</button></div></div>';

  h += '<div class="stats"><div class="stat"><div class="stat-num" style="color:var(--primary-light)">' + avail.length + '</div><div class="stat-label">Disponibles</div></div>';
  h += '<div class="stat"><div class="stat-num" style="color:var(--warning)">' + leads.filter(function(l){return l.assigned_to===user.id}).length + '</div><div class="stat-label">Mes leads</div></div>';
  h += '<div class="stat"><div class="stat-num" style="color:var(--success)">' + leads.filter(function(l){return l.status==='sold'}).length + '</div><div class="stat-label">Vendus</div></div></div>';

  h += '<input type="text" class="search" placeholder="Chercher..." oninput="render()" id="search-input">';

  var query = (document.getElementById('search-input') || {}).value || '';
  var filtered = avail.filter(function(l) { return !query || l.name.toLowerCase().includes(query.toLowerCase()); });

  if (filtered.length === 0) { h += '<div class="empty">Aucun lead disponible</div>'; }
  else { filtered.forEach(function(l) { h += renderLeadCard(l, 'available'); }); }

  document.getElementById('page-content').innerHTML = h;
}

function renderMine() {
  var mine = leads.filter(function(l) { return l.assigned_to === user.id; });
  var h = '<div class="topbar"><h1>Mes <span>Leads</span></h1><div class="topbar-right"><span class="user-pill">' + (seller ? seller.name : '') + '</span></div></div>';

  // Counts per status
  var counts = { all: mine.length, assigned: 0, emailed: 0, replied: 0, sold: 0, rejected: 0 };
  mine.forEach(function(l) { if (counts[l.status] !== undefined) counts[l.status]++; });

  h += '<div class="sub-filters">';
  h += '<div class="sub-filter' + (mineFilter === 'all' ? ' active' : '') + '" onclick="setMineFilter(\'all\')">Tous<span class="count">' + counts.all + '</span></div>';
  h += '<div class="sub-filter' + (mineFilter === 'assigned' ? ' active' : '') + '" onclick="setMineFilter(\'assigned\')">Nouveaux<span class="count">' + counts.assigned + '</span></div>';
  h += '<div class="sub-filter' + (mineFilter === 'emailed' ? ' active' : '') + '" onclick="setMineFilter(\'emailed\')">Envoyés<span class="count">' + counts.emailed + '</span></div>';
  h += '<div class="sub-filter' + (mineFilter === 'replied' ? ' active' : '') + '" onclick="setMineFilter(\'replied\')">Répondus<span class="count">' + counts.replied + '</span></div>';
  h += '<div class="sub-filter' + (mineFilter === 'sold' ? ' active' : '') + '" onclick="setMineFilter(\'sold\')">Vendus<span class="count">' + counts.sold + '</span></div>';
  h += '<div class="sub-filter' + (mineFilter === 'rejected' ? ' active' : '') + '" onclick="setMineFilter(\'rejected\')">Rejetés<span class="count">' + counts.rejected + '</span></div>';
  h += '</div>';

  var filtered = mineFilter === 'all' ? mine : mine.filter(function(l) { return l.status === mineFilter; });

  if (filtered.length === 0) { h += '<div class="empty">' + (mine.length === 0 ? 'Aucun lead pris. Va dans Disponibles!' : 'Aucun lead dans cette catégorie') + '</div>'; }
  else { filtered.forEach(function(l) { h += renderLeadCard(l, 'mine'); }); }

  document.getElementById('page-content').innerHTML = h;
}

function renderAdmin() {
  var h = '<div class="topbar"><h1>Admin <span>Panel</span></h1></div>';
  var totalRevenue = leads.filter(function(l){return l.payment_amount}).reduce(function(sum,l){return sum+(l.payment_amount||0)},0);
  h += '<div class="stats"><div class="stat"><div class="stat-num">' + leads.length + '</div><div class="stat-label">Total leads</div></div>';
  h += '<div class="stat"><div class="stat-num">' + sellers.length + '</div><div class="stat-label">Vendeurs</div></div>';
  h += '<div class="stat"><div class="stat-num" style="color:var(--success)">' + leads.filter(function(l){return l.status==='sold'}).length + '</div><div class="stat-label">Vendus</div></div>';
  h += '<div class="stat"><div class="stat-num" style="color:var(--success)">' + totalRevenue + '$</div><div class="stat-label">Revenus</div></div></div>';

  h += '<h3 style="font-size:14px;font-weight:700;margin-bottom:12px;color:var(--text-light)">VENDEURS</h3>';
  sellers.forEach(function(s) {
    var sl = leads.filter(function(l){return l.assigned_to===s.id});
    var sent = sl.filter(function(l){return['emailed','replied','sold'].includes(l.status)}).length;
    var sold = sl.filter(function(l){return l.status==='sold'}).length;
    var rev = sl.filter(function(l){return l.payment_amount}).reduce(function(sum,l){return sum+(l.payment_amount||0)},0);
    h += '<div class="seller-row"><div><div class="seller-name">' + s.name + (s.role==='admin'?' 👑':'') + '</div><div class="seller-email">' + s.email + '</div></div>';
    h += '<div style="display:flex;gap:16px;font-size:12px;text-align:center"><div><div style="font-weight:700">' + sl.length + '</div><div style="color:var(--text-muted);font-size:10px">LEADS</div></div>';
    h += '<div><div style="font-weight:700;color:var(--warning)">' + sent + '</div><div style="color:var(--text-muted);font-size:10px">ENVOYÉS</div></div>';
    h += '<div><div style="font-weight:700;color:var(--success)">' + sold + '</div><div style="color:var(--text-muted);font-size:10px">VENDUS</div></div>';
    h += '<div><div style="font-weight:700;color:var(--success)">' + rev + '$</div><div style="color:var(--text-muted);font-size:10px">REVENUS</div></div></div></div>';
  });
  document.getElementById('page-content').innerHTML = h;
}

function renderLeadCard(l, mode) {
  var sc = l.score <= 4 ? 'score-low' : 'score-med';
  var h = '<div class="lead-card">';
  h += '<div class="lead-top"><div><div class="lead-name">' + l.name + '</div><div class="lead-meta">' + (l.industry||'') + ' · ' + (l.batch_date||'') + '</div></div>';
  h += '<div class="lead-score ' + sc + '">' + (l.score||'?') + '/10</div></div>';

  h += '<div class="lead-contact">';
  if (l.phone) h += '<span>📞 ' + l.phone + '</span>';
  if (l.email) h += '<span>✉️ ' + l.email + '</span>';
  if (l.site_current) h += '<a href="https://' + l.site_current + '" target="_blank">🌐 ' + l.site_current + '</a>';
  h += '</div>';

  h += '<div class="lead-btns">';
  if (l.site_demo) h += '<a href="' + l.site_demo + '" target="_blank" class="lead-btn btn-demo">Voir démo</a>';
  if (mode === 'available') h += '<button class="lead-btn btn-claim" onclick="claimLead(\'' + l.id + '\')">Prendre ce lead</button>';
  h += '</div>';

  if (l.email_body) {
    h += '<button class="expand-btn" onclick="toggle(\'e-'+l.id+'\')">📧 Email</button>';
    h += '<div id="e-'+l.id+'" class="expand-content hidden"><div class="expand-label">Email à envoyer</div>';
    if (l.email) h += '<div style="font-size:11px;color:var(--text-muted);margin-bottom:4px">À: ' + l.email + '</div>';
    if (l.email_subject) h += '<div class="expand-subject">Objet: ' + l.email_subject + '</div>';
    h += '<div class="expand-body">' + l.email_body.replace(/\n/g,'<br>') + '</div>';
    h += '<button class="copy-btn" onclick="doCopy(\'' + esc(l.email_body) + '\',this)">Copier</button></div>';
  }
  if (l.sms_body) {
    h += '<button class="expand-btn" onclick="toggle(\'s-'+l.id+'\')">📱 SMS</button>';
    h += '<div id="s-'+l.id+'" class="expand-content hidden"><div class="expand-label">SMS</div>';
    h += '<div style="font-size:12px;color:var(--text-light)">' + l.sms_body + '</div>';
    h += '<button class="copy-btn" onclick="doCopy(\'' + esc(l.sms_body) + '\',this)">Copier</button></div>';
  }

  if (mode === 'mine') {
    // Payment link section
    if (l.payment_link) {
      h += '<div style="background:var(--success-light);border-radius:10px;padding:12px;margin-top:10px;display:flex;justify-content:space-between;align-items:center">';
      h += '<div><div style="font-size:11px;color:var(--success);font-weight:700;text-transform:uppercase;letter-spacing:0.5px">Lien de paiement</div>';
      h += '<div style="font-size:14px;font-weight:700;color:var(--success);margin-top:2px">' + l.payment_amount + ' $ CAD</div></div>';
      h += '<button class="copy-btn" style="background:var(--success);color:white;border:none" onclick="doCopy(\'' + esc(l.payment_link) + '\',this)">Copier le lien</button>';
      h += '</div>';
    } else {
      h += '<div style="margin-top:10px">';
      h += '<button class="expand-btn" onclick="toggle(\'pay-'+l.id+'\')">💳 Créer lien de paiement</button>';
      h += '<div id="pay-'+l.id+'" class="expand-content hidden">';
      h += '<div class="expand-label">Montant à charger ($ CAD)</div>';
      h += '<input type="number" class="input" id="amount-'+l.id+'" placeholder="Ex: 800" style="margin-bottom:8px">';
      h += '<button class="btn btn-primary btn-small" style="width:100%" onclick="createPaymentLink(\''+l.id+'\',\''+esc(l.name)+'\')">Générer le lien Stripe</button>';
      h += '</div></div>';
    }

    h += '<div class="status-actions">';
    h += '<button class="status-btn' + (l.status==='emailed'?' s-emailed':'') + '" onclick="setStatus(\''+l.id+'\',\'emailed\')">📧 Envoyé</button>';
    h += '<button class="status-btn' + (l.status==='replied'?' s-replied':'') + '" onclick="setStatus(\''+l.id+'\',\'replied\')">💬 Répondu</button>';
    h += '<button class="status-btn' + (l.status==='sold'?' s-sold':'') + '" onclick="setStatus(\''+l.id+'\',\'sold\')">💰 Vendu</button>';
    h += '<button class="status-btn' + (l.status==='rejected'?' s-rejected':'') + '" onclick="setStatus(\''+l.id+'\',\'rejected\')">❌ Rejeté</button>';
    h += '</div>';
  }
  h += '</div>';
  return h;
}

async function claimLead(id) {
  await SB.from('lead_businesses').update({assigned_to:user.id,status:'assigned',assigned_at:new Date().toISOString()}).eq('id',id);
  await loadData(); render();
}
async function setStatus(id,s) {
  var u = {status:s};
  if(s==='emailed') u.emailed_at=new Date().toISOString();
  if(s==='replied') u.replied_at=new Date().toISOString();
  if(s==='sold') u.sold_at=new Date().toISOString();
  await SB.from('lead_businesses').update(u).eq('id',id);
  await loadData(); render();
}
async function createPaymentLink(leadId, businessName) {
  var amountInput = document.getElementById('amount-' + leadId);
  var amount = parseFloat(amountInput.value);
  if (!amount || amount <= 0) { alert('Entrez un montant valide'); return; }

  var session = await SB.auth.getSession();
  var token = session.data.session.access_token;

  var res = await fetch('https://ybmzhztsyyrpxgsempzz.supabase.co/functions/v1/create-payment-link', {
    method: 'POST',
    headers: {
      'Content-Type': 'application/json',
      'Authorization': 'Bearer ' + token,
      'apikey': 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InlibXpoenRzeXlycHhnc2VtcHp6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM2OTU0MTgsImV4cCI6MjA4OTI3MTQxOH0.MBjRFHrF1viOaV1pJqNnQjxEk7mpzJo-DksHtbCk-ug',
    },
    body: JSON.stringify({ lead_id: leadId, amount: amount, business_name: businessName.replace(/\\'/g, "'") }),
  });

  var data = await res.json();
  if (data.url) {
    await loadData();
    render();
  } else {
    alert('Erreur: ' + (data.error || 'Échec'));
  }
}

function toggle(id){document.getElementById(id).classList.toggle('hidden')}
function doCopy(t,btn){try{navigator.clipboard.writeText(t.replace(/\\n/g,'\n'))}catch(e){}var o=btn.textContent;btn.textContent='Copié!';setTimeout(function(){btn.textContent=o},1500)}
function esc(s){return(s||'').replace(/\\/g,'\\\\').replace(/'/g,"\\'").replace(/\n/g,'\\n')}
