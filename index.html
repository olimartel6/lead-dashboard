<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lead Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0B0D13; --card: #13151D; --elevated: #1A1D28; --border: #2A2D3A;
  --text: #E8E9ED; --text-light: #9CA3AF; --text-muted: #6B7280;
  --primary: #8B5CF6; --primary-light: #A78BFA; --primary-glow: rgba(139,92,246,0.15);
  --success: #10B981; --success-light: rgba(16,185,129,0.12);
  --warning: #F59E0B; --danger: #EF4444;
  --radius: 14px; --font: 'Inter', system-ui, sans-serif;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: var(--font); background: var(--bg); color: var(--text); min-height: 100vh; }
.container { max-width: 900px; margin: 0 auto; padding: 24px 16px; }

.header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 28px; }
.header h1 { font-size: 24px; font-weight: 800; }
.header h1 span { color: var(--primary-light); }
.stats { display: flex; gap: 8px; }
.stat { background: var(--card); border: 1px solid var(--border); border-radius: 10px; padding: 8px 14px; text-align: center; }
.stat-num { font-size: 20px; font-weight: 800; }
.stat-label { font-size: 10px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.5px; }

.filters { display: flex; gap: 8px; margin-bottom: 20px; flex-wrap: wrap; }
.filter-btn { background: var(--elevated); border: 1px solid var(--border); border-radius: 8px; padding: 8px 16px; color: var(--text-light); font-family: var(--font); font-size: 13px; font-weight: 600; cursor: pointer; transition: all 0.2s; }
.filter-btn.active { background: var(--primary); color: white; border-color: var(--primary); }
.filter-btn:hover { border-color: var(--primary); }

.search { width: 100%; padding: 12px 16px; background: var(--card); border: 1px solid var(--border); border-radius: 10px; color: var(--text); font-family: var(--font); font-size: 14px; margin-bottom: 20px; }
.search:focus { outline: none; border-color: var(--primary); }
.search::placeholder { color: var(--text-muted); }

.lead-card { background: var(--card); border: 1px solid var(--border); border-radius: var(--radius); padding: 20px; margin-bottom: 12px; transition: all 0.2s; }
.lead-card:hover { border-color: var(--primary); }
.lead-card.sent { opacity: 0.6; }
.lead-card.sent .lead-name { text-decoration: line-through; }

.lead-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 12px; }
.lead-name { font-size: 17px; font-weight: 700; }
.lead-industry { font-size: 12px; color: var(--text-muted); margin-top: 2px; }
.lead-score { font-size: 13px; font-weight: 700; padding: 4px 10px; border-radius: 6px; }
.score-bad { background: rgba(239,68,68,0.15); color: var(--danger); }
.score-ok { background: rgba(245,158,11,0.15); color: var(--warning); }

.lead-info { display: flex; flex-wrap: wrap; gap: 12px; margin-bottom: 14px; font-size: 13px; color: var(--text-light); }
.lead-info a { color: var(--primary-light); text-decoration: none; }
.lead-info a:hover { text-decoration: underline; }

.lead-links { display: flex; gap: 8px; margin-bottom: 14px; flex-wrap: wrap; }
.link-btn { display: inline-flex; align-items: center; gap: 4px; padding: 6px 12px; border-radius: 8px; font-size: 12px; font-weight: 600; text-decoration: none; transition: all 0.2s; }
.link-demo { background: var(--primary-glow); color: var(--primary-light); }
.link-site { background: var(--elevated); color: var(--text-light); border: 1px solid var(--border); }

.email-section { background: var(--elevated); border-radius: 10px; padding: 16px; margin-bottom: 12px; }
.email-label { font-size: 11px; font-weight: 700; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 8px; }
.email-subject { font-size: 14px; font-weight: 600; margin-bottom: 8px; color: var(--primary-light); }
.email-body { font-size: 13px; color: var(--text-light); line-height: 1.6; white-space: pre-wrap; }
.email-to { font-size: 12px; color: var(--text-muted); margin-bottom: 6px; }

.sms-section { background: var(--elevated); border-radius: 10px; padding: 16px; margin-bottom: 14px; }
.sms-body { font-size: 13px; color: var(--text-light); line-height: 1.5; }

.actions { display: flex; gap: 8px; align-items: center; }
.btn { padding: 8px 16px; border: none; border-radius: 8px; font-family: var(--font); font-size: 13px; font-weight: 600; cursor: pointer; transition: all 0.2s; }
.btn-copy { background: var(--elevated); color: var(--text-light); border: 1px solid var(--border); }
.btn-copy:hover { border-color: var(--primary); color: var(--primary-light); }
.btn-sent { background: var(--success-light); color: var(--success); }
.btn-sent.done { background: var(--success); color: white; }

.toggle-email { background: none; border: none; color: var(--primary-light); font-family: var(--font); font-size: 13px; font-weight: 600; cursor: pointer; padding: 4px 0; }

.date-badge { display: inline-block; background: var(--elevated); border: 1px solid var(--border); border-radius: 6px; padding: 4px 10px; font-size: 11px; font-weight: 600; color: var(--text-muted); margin-bottom: 2px; }

.empty { text-align: center; padding: 60px 20px; color: var(--text-muted); }

@media (max-width: 600px) {
  .header { flex-direction: column; gap: 12px; align-items: flex-start; }
  .lead-info { flex-direction: column; gap: 4px; }
}
</style>
</head>
<body>

    </div>

  <input type="text" class="search" placeholder="Chercher un lead..." id="search" oninput="renderLeads()">

    <button class="filter-btn active" data-filter="all" onclick="setFilter('all')">Tous</button>
    <button class="filter-btn" data-filter="pending" onclick="setFilter('pending')">En attente</button>
    <button class="filter-btn" data-filter="sent" onclick="setFilter('sent')">Envoyés</button>

  <div id="leads-container"></div>
</div>

var currentFilter = 'all';
var sentLeads = JSON.parse(localStorage.getItem('sentLeads') || '{}');

function setFilter(f) {
  currentFilter = f;
  document.querySelectorAll('.filter-btn').forEach(function(b) { b.classList.toggle('active', b.dataset.filter === f); });
  renderLeads();
}

function toggleSent(name) {
  if (sentLeads[name]) delete sentLeads[name];
  else sentLeads[name] = new Date().toISOString();
  localStorage.setItem('sentLeads', JSON.stringify(sentLeads));
  renderLeads();
}

function copyText(text, btn) {
  navigator.clipboard.writeText(text).catch(function() {});
  var orig = btn.textContent;
  btn.textContent = 'Copié!';
  btn.style.color = 'var(--success)';
  setTimeout(function() { btn.textContent = orig; btn.style.color = ''; }, 1500);
}

function renderLeads() {
  var query = document.getElementById('search').value.toLowerCase();
  var container = document.getElementById('leads-container');
  var html = '';
  var total = 0, sent = 0, pending = 0;

  var filtered = LEADS.filter(function(l) {
    var matchSearch = !query || l.name.toLowerCase().includes(query) || l.industry.toLowerCase().includes(query);
    var isSent = !!sentLeads[l.name];
    var matchFilter = currentFilter === 'all' || (currentFilter === 'sent' && isSent) || (currentFilter === 'pending' && !isSent);
    return matchSearch && matchFilter;
  });

  LEADS.forEach(function(l) { total++; if (sentLeads[l.name]) sent++; else pending++; });
  document.getElementById('total-count').textContent = total;
  document.getElementById('sent-count').textContent = sent;
  document.getElementById('pending-count').textContent = pending;

  if (filtered.length === 0) {
    container.innerHTML = '<div class="empty">Aucun lead trouvé</div>';
    return;
  }

  filtered.forEach(function(l, i) {
    var isSent = !!sentLeads[l.name];
    var scoreClass = l.score <= 5 ? 'score-bad' : 'score-ok';
    var id = 'lead-' + i;

    html += '<div class="lead-card' + (isSent ? ' sent' : '') + '">';
    html += '<div class="lead-header">';
    html += '<div><div class="lead-name">' + l.name + '</div><div class="lead-industry">' + l.industry + ' · <span class="date-badge">' + l.date + '</span></div></div>';
    html += '<div class="lead-score ' + scoreClass + '">' + l.score + '/10</div>';
    html += '</div>';

    html += '<div class="lead-info">';
    if (l.phone) html += '<span>📞 ' + l.phone + '</span>';
    if (l.email) html += '<span>✉️ ' + l.email + '</span>';
    if (l.site) html += '<span>🌐 <a href="https://' + l.site + '" target="_blank">' + l.site + '</a></span>';
    html += '</div>';

    html += '<div class="lead-links">';
    html += '<a href="' + l.demo + '" target="_blank" class="link-btn link-demo">🔗 Voir la démo</a>';
    if (l.site) html += '<a href="https://' + l.site + '" target="_blank" class="link-btn link-site">🌐 Site actuel</a>';
    html += '</div>';

    if (l.emailBody) {
      html += '<button class="toggle-email" onclick="var el=document.getElementById(\'' + id + '-email\');el.style.display=el.style.display===\'none\'?\'block\':\'none\'">📧 Voir l\'email</button>';
      html += '<div id="' + id + '-email" style="display:none;margin-top:8px">';
      html += '<div class="email-section">';
      html += '<div class="email-label">Email à envoyer</div>';
      if (l.email) html += '<div class="email-to">À : ' + l.email + '</div>';
      html += '<div class="email-subject">Objet : ' + l.emailSubject + '</div>';
      html += '<div class="email-body">' + l.emailBody.replace(/\n/g, '<br>') + '</div>';
      html += '<button class="btn btn-copy" style="margin-top:10px" onclick="copyText(`' + l.emailBody.replace(/`/g, "'") + '`, this)">Copier l\'email</button>';
      html += '</div></div>';
    }

    if (l.sms) {
      html += '<button class="toggle-email" onclick="var el=document.getElementById(\'' + id + '-sms\');el.style.display=el.style.display===\'none\'?\'block\':\'none\'">📱 Voir le SMS</button>';
      html += '<div id="' + id + '-sms" style="display:none;margin-top:8px">';
      html += '<div class="sms-section">';
      html += '<div class="email-label">SMS de suivi</div>';
      html += '<div class="sms-body">' + l.sms + '</div>';
      html += '<button class="btn btn-copy" style="margin-top:10px" onclick="copyText(`' + l.sms.replace(/`/g, "'") + '`, this)">Copier le SMS</button>';
      html += '</div></div>';
    }

    html += '<div class="actions" style="margin-top:12px">';
    html += '<button class="btn btn-sent' + (isSent ? ' done' : '') + '" onclick="toggleSent(\'' + l.name.replace(/'/g, "\\'") + '\')">' + (isSent ? '✓ Envoyé' : '☐ Marquer envoyé') + '</button>';
    html += '</div>';

    html += '</div>';
  });

  container.innerHTML = html;
}
